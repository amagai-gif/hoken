<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f0ece4;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1rem;font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;}
.wrap{width:100%;max-width:860px;}
.comic-stage{background:#fff;border:3px solid #222;border-radius:4px;min-height:460px;display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:6px 6px 0 #222;}
.page-num{position:absolute;top:8px;right:12px;font-size:12px;color:#888;}
.comic-grid{display:grid;flex:1;gap:2px;background:#222;padding:2px;}
.panel{background:#fff;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.panel-inner{width:100%;height:100%;position:relative;}
.speech{position:absolute;background:#fff;border:2px solid #222;border-radius:12px;padding:6px 10px;font-size:13px;font-weight:500;line-height:1.45;color:#111;max-width:180px;z-index:10;}
.speech::after{content:"";position:absolute;bottom:-10px;left:20px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:10px solid #222;}
.speech.right::after{left:auto;right:20px;}
.speech.top::after{display:none;}
.speech.top::before{content:"";position:absolute;top:-10px;left:20px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:10px solid #222;}
.thought{position:absolute;background:#fff;border:2px dashed #555;border-radius:20px;padding:6px 10px;font-size:12px;line-height:1.4;color:#333;max-width:160px;z-index:10;font-style:italic;}
.caption{position:absolute;top:8px;left:8px;background:#222;color:#fff;font-size:11px;font-weight:500;padding:3px 8px;border-radius:2px;z-index:10;}
.caption.bottom{top:auto;bottom:8px;}
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:12px;}
.nav-btn{border:2px solid #222;background:#fff;border-radius:4px;padding:11px 28px;font-size:15px;font-weight:500;cursor:pointer;color:#222;transition:all .15s;box-shadow:3px 3px 0 #222;}
.nav-btn:hover{background:#222;color:#fff;transform:translate(2px,2px);box-shadow:1px 1px 0 #222;}
.nav-btn:disabled{opacity:.25;cursor:default;box-shadow:3px 3px 0 #222;}
.dots{display:flex;gap:6px;}
.dot{width:10px;height:10px;border-radius:50%;background:#ccc;border:1.5px solid #aaa;cursor:pointer;transition:all .2s;}
.dot.on{background:#222;border-color:#222;}
.prog{font-size:12px;color:#888;margin-top:4px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
<div class="comic-stage" id="comic-stage">

  <div id="comic-content" style="flex:1;display:flex;flex-direction:column;"></div>

  <div style="display:flex;flex-direction:column;align-items:center;">

let cur = 0;
function renderDots(){document.getElementById("dots").innerHTML=PAGES.map((_,i)=>`<div class="dot ${i===cur?"on":""}" onclick="goto(${i})"></div>`).join("");}
function goto(n){cur=n;render();}
function render(){
  const el=document.getElementById("comic-content");
  el.style.opacity=0;
  setTimeout(()=>{
    el.innerHTML=PAGES[cur]();
    document.getElementById("page-num").textContent=`${cur+1} / ${PAGES.length}`;
    document.getElementById("prev").disabled=cur===0;
    document.getElementById("next").disabled=cur===PAGES.length-1;
    renderDots();
    el.style.transition="opacity .2s";
    el.style.opacity=1;
  },60);
}
function move(d){cur=Math.max(0,Math.min(PAGES.length-1,cur+d));render();}
document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")move(1);if(e.key==="ArrowLeft")move(-1);});
render();
</script>
