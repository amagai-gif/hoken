<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>導入クイズ：結婚生活と健康</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1rem;font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;}
.app{background:#0d0d0d;width:100%;max-width:960px;min-height:520px;border-radius:16px;padding:2.5rem 3rem;display:flex;flex-direction:column;position:relative;overflow:hidden;color:#fff;}
.slide-num{position:absolute;top:1.25rem;right:1.5rem;font-size:14px;color:#555;}
.intro-badge{display:inline-block;font-size:13px;font-weight:700;padding:5px 16px;border-radius:20px;margin-bottom:1.25rem;background:#3a2010;color:#f0a060;}
.intro-title{font-size:32px;font-weight:700;color:#fff;line-height:1.45;margin-bottom:0.6rem;}
.intro-sub{font-size:20px;color:#aaa;line-height:1.6;margin-bottom:1.25rem;}
.teacher-note{font-size:13px;color:#555;border-left:2px solid #333;padding-left:0.75rem;line-height:1.6;}
.q-tag{display:inline-block;font-size:13px;font-weight:700;padding:5px 16px;border-radius:20px;margin-bottom:1.25rem;background:#3a2010;color:#f0a060;}
.q-text{font-size:32px;font-weight:700;color:#fff;line-height:1.5;white-space:pre-line;margin-bottom:2rem;flex:1;}
.btn-row{display:flex;gap:16px;margin-top:auto;}
.ans-btn{flex:1;padding:20px 12px;border:2.5px solid;border-radius:14px;font-family:inherit;font-size:24px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;background:transparent;}
.btn-o{border-color:#2a6e4a;color:#4ecb87;}
.btn-x{border-color:#7a2020;color:#f07070;}
.btn-o:hover:not(:disabled){background:#1a3d2a;}
.btn-x:hover:not(:disabled){background:#3a1010;}
.ans-btn:disabled{opacity:.3;cursor:default;}
.big-answer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:16px;z-index:10;opacity:0;pointer-events:none;transition:opacity .15s;}
.big-answer.show{opacity:1;pointer-events:auto;}
.big-mark{font-size:160px;font-weight:700;line-height:1;}
.anim-pop{animation:pop .35s cubic-bezier(.2,1.4,.4,1) both;}
@keyframes pop{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
.bg-ok{background:#0a2a18;}.bg-ng{background:#2a0a0a;}
.col-ok{color:#4ecb87;}.col-ng{color:#f07070;}
.explain-box{position:absolute;inset:0;border-radius:16px;padding:2.5rem 3rem;display:flex;flex-direction:column;justify-content:center;z-index:20;opacity:0;pointer-events:none;transition:opacity .2s;}
.explain-box.show{opacity:1;pointer-events:auto;}
.explain-mark{font-size:72px;font-weight:700;line-height:1;margin-bottom:1rem;}
.explain-text{font-size:30px;font-weight:700;line-height:1.75;white-space:pre-line;color:#fff;}
.explain-hint{font-size:15px;color:#555;margin-top:1.75rem;}
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;width:100%;max-width:960px;}
.nav-btn{border:1px solid #333;background:#1a1a1a;border-radius:8px;padding:12px 28px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;color:#aaa;transition:all .15s;}
.nav-btn:hover{background:#2a2a2a;color:#fff;}
.nav-btn:disabled{opacity:.25;cursor:default;}
.dots-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;}
.dots{display:flex;gap:5px;flex-wrap:wrap;max-width:200px;justify-content:center;}
.dot{width:9px;height:9px;border-radius:50%;background:#333;flex-shrink:0;transition:background .2s;}
.dot.cur{background:#f0a060;}.dot.done-ok{background:#4ecb87;}.dot.done-ng{background:#f07070;}
.prog{font-size:12px;color:#555;}

/* ===== 全問正解オーバーレイ ===== */
#celebrate{
  position:fixed;inset:0;z-index:1000;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.85);
}
#celebrate.show{display:flex;}
#celebrate canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.celebrate-msg{
  position:relative;z-index:10;
  text-align:center;
  animation:celebIn .6s cubic-bezier(.2,1.4,.4,1) both;
}
@keyframes celebIn{from{transform:scale(.3) rotate(-10deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}
.celebrate-emoji{font-size:80px;display:block;margin-bottom:0.5rem;animation:bounce 1s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
.celebrate-title{font-size:52px;font-weight:700;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.8);margin-bottom:0.5rem;}
.celebrate-sub{font-size:24px;color:#fff;margin-bottom:0.5rem;opacity:.9;}
.celebrate-score{font-size:20px;color:#f0a060;margin-bottom:2rem;}
.celebrate-close{border:2px solid #ffd700;background:transparent;color:#ffd700;border-radius:12px;padding:14px 40px;font-family:inherit;font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;}
.celebrate-close:hover{background:#ffd700;color:#000;}
</style>
</head>
<body>

<div class="app" id="app">
  <span class="slide-num" id="snum"></span>
  <div id="content" style="display:flex;flex-direction:column;flex:1;"></div>
  <div class="big-answer" id="big-answer"><div class="big-mark" id="big-mark"></div></div>
  <div class="explain-box" id="explain-box">
    <div class="explain-mark" id="explain-mark"></div>
    <div class="explain-text" id="explain-text"></div>
    <div class="explain-hint">← → キーまたは下のボタンで次へ</div>
  </div>
</div>
<div class="nav">
  <button class="nav-btn" id="prev" onclick="move(-1)" disabled>← 前へ</button>
  <div class="dots-wrap">
    <div class="dots" id="dots"></div>
    <div class="prog" id="prog"></div>
  </div>
  <button class="nav-btn" id="next" onclick="move(1)">次へ →</button>
</div>

<!-- 全問正解オーバーレイ -->
<div id="celebrate">
  <canvas id="fw-canvas"></canvas>
  <div class="celebrate-msg">
    <span class="celebrate-emoji">🎊</span>
    <div class="celebrate-title">全問正解！！</div>
    <div class="celebrate-sub">おめでとう！！🎉</div>
    <div class="celebrate-score">7問全部正解！すごい！！</div>
    <button class="celebrate-close" onclick="closeCelebrate()">閉じる</button>
  </div>
</div>

<script>
const SLIDES=[
  {type:"intro",title:"最初にちょっと質問します。",sub:"みんなで考えてみよう。",note:"答えを確認しながら授業を進めます。"},
  {type:"ox",q:"「結婚したい」と思っている\n未婚の若者（18〜34歳）は\n今の日本では半分以下だ",ans:"x",
   explain:"実は8割以上が「いずれ結婚するつもり」と答えています。\n「結婚したくない」のではなく\n「出会えない」「お金がない」が本音のようです。"},
  {type:"ox",q:"独身でいる理由の第1位は\n「お金がないから」だ",ans:"x",
   explain:"実は第1位は「適当な相手にめぐりあわない」です（男女ともに）。\nお金より出会いの問題の方が大きいようです。"},
  {type:"ox",q:"「子育てにお金がかかりすぎる」は\n希望する数の子どもを持てない理由の\nずっと第1位だ",ans:"o",
   explain:"長年にわたり第1位をキープしています。\n教育費・保育費の高さが\n少子化の大きな要因の一つになっています。"},
  {type:"ox",q:"赤ちゃんが泣き止まないとき\n激しく揺さぶっても\n特に問題はない",ans:"x",
   explain:"「揺さぶられ症候群」といい、\n脳や目に深刻なダメージを与えることがあります。\n泣き止まないときは一度置いて自分を落ち着かせることが大切です。"},
  {type:"ox",q:"産後うつになるのは\n女性だけだ",ans:"x",
   explain:"父親も産後うつになることがわかっています。\n育児の孤立・睡眠不足・責任感から\n男性も精神的健康を損なうことがあります。"},
  {type:"ox",q:"今の日本で50歳時点でまだ\n結婚していない男性は\n約3人に1人だ",ans:"o",
   explain:"2020年のデータで男性28.3%、女性17.8%。\nかつては「生涯未婚率」は数%だったので\n大きく変化しています。"},
  {type:"ox",q:"夫婦で朝・夕食を\n一緒に食べる子どもの方が\n運動習慣があり健康的な傾向がある",ans:"o",
   explain:"教科書p.89の図3にも示されているデータです。\n共食は食事だけでなく\n子どもの生活習慣全体に影響します。"},
];

const TOTAL_Q = SLIDES.filter(s=>s.type==="ox").length;
let cur=0;
const chosen=new Array(SLIDES.length).fill(null);

// ===== 花火アニメーション =====
let fwAnim=null;
function launchFireworks(){
  const canvas=document.getElementById("fw-canvas");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  const particles=[];
  const COLORS=["#ffd700","#ff6b6b","#4ecb87","#60b8ff","#f0a060","#a89ef5","#ff9060","#fff"];

  function createBurst(x,y){
    const color=COLORS[Math.floor(Math.random()*COLORS.length)];
    const count=60+Math.floor(Math.random()*40);
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=2+Math.random()*6;
      particles.push({
        x,y,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        life:1,decay:0.012+Math.random()*0.01,
        size:2+Math.random()*4,
        color,trail:[]
      });
    }
  }

  // 最初の花火
  for(let i=0;i<6;i++){
    setTimeout(()=>{
      createBurst(
        100+Math.random()*(canvas.width-200),
        80+Math.random()*(canvas.height*0.5)
      );
    },i*180);
  }

  // ランダムに続ける
  let burstCount=0;
  const burstInterval=setInterval(()=>{
    createBurst(
      100+Math.random()*(canvas.width-200),
      60+Math.random()*(canvas.height*0.55)
    );
    burstCount++;
    if(burstCount>20) clearInterval(burstInterval);
  },400);

  function loop(){
    ctx.fillStyle="rgba(0,0,0,0.18)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.08;
      p.vx*=0.98; p.life-=p.decay;
      if(p.life<=0){particles.splice(i,1);continue;}
      ctx.globalAlpha=p.life;
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    fwAnim=requestAnimationFrame(loop);
  }
  loop();
}

function showCelebrate(){
  document.getElementById("celebrate").classList.add("show");
  launchFireworks();
}

function closeCelebrate(){
  document.getElementById("celebrate").classList.remove("show");
  if(fwAnim) cancelAnimationFrame(fwAnim);
  const canvas=document.getElementById("fw-canvas");
  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

function checkAllCorrect(){
  const qs=SLIDES.map((s,i)=>s.type==="ox"?i:-1).filter(i=>i>=0);
  const allAnswered=qs.every(i=>chosen[i]!==null);
  if(!allAnswered) return;
  const allOk=qs.every(i=>SLIDES[i].ans===chosen[i]);
  if(allOk) setTimeout(showCelebrate, 600);
}

// ===== クイズ本体 =====
function getDisplay(s,v){
  return s.ans===v?{sym:"○",bg:"bg-ok",col:"col-ok"}:{sym:"×",bg:"bg-ng",col:"col-ng"};
}
function isOk(s,v){if(!v)return false;return s.ans===v;}

function showAnswer(v){
  const s=SLIDES[cur]; chosen[cur]=v;
  const d=getDisplay(s,v);
  const ba=document.getElementById("big-answer");
  ba.className="big-answer "+d.bg+" show";
  const bm=document.getElementById("big-mark");
  const nb=bm.cloneNode(false);
  nb.className="big-mark anim-pop "+d.col; nb.textContent=d.sym;
  bm.parentNode.replaceChild(nb,bm);
  setTimeout(()=>{
    ba.className="big-answer";
    const eb=document.getElementById("explain-box");
    eb.className="explain-box "+d.bg+" show";
    document.getElementById("explain-mark").className="explain-mark "+d.col;
    document.getElementById("explain-mark").textContent=d.sym;
    document.getElementById("explain-text").textContent=s.explain;
    renderDots();
    checkAllCorrect();
  },900);
}

function renderDots(){
  const qs=SLIDES.map((s,i)=>s.type==="ox"?i:-1).filter(i=>i>=0);
  document.getElementById("dots").innerHTML=qs.map(i=>{
    let c="dot";
    if(i===cur) c+=" cur";
    else if(chosen[i]!==null) c+=isOk(SLIDES[i],chosen[i])?" done-ok":" done-ng";
    return `<div class="${c}"></div>`;
  }).join("");
}

function render(){
  const s=SLIDES[cur];
  document.getElementById("snum").textContent=`${cur+1} / ${SLIDES.length}`;
  document.getElementById("prev").disabled=cur===0;
  document.getElementById("next").disabled=cur===SLIDES.length-1;
  const qN=SLIDES.slice(0,cur+1).filter(x=>x.type==="ox").length;
  document.getElementById("prog").textContent=s.type==="ox"?`Q${qN} / ${TOTAL_Q}`:"← → で進む";
  document.getElementById("big-answer").className="big-answer";
  const eb=document.getElementById("explain-box");
  if(chosen[cur]!==null&&s.type==="ox"){
    const d=getDisplay(s,chosen[cur]);
    eb.className="explain-box "+d.bg+" show";
    document.getElementById("explain-mark").className="explain-mark "+d.col;
    document.getElementById("explain-mark").textContent=d.sym;
    document.getElementById("explain-text").textContent=s.explain;
  }else{eb.className="explain-box";}
  renderDots();
  let html="";
  if(s.type==="intro"){
    html=`<div class="intro-badge">導入</div><div class="intro-title">${s.title}</div><div class="intro-sub">${s.sub}</div><div class="teacher-note">教員メモ：${s.note}</div>`;
  }else{
    const lk=chosen[cur]!==null?"disabled":"";
    html=`<div class="q-tag">結婚生活と健康</div><div class="q-text">${s.q}</div><div class="btn-row"><button class="ans-btn btn-o" onclick="showAnswer('o')" ${lk}>○</button><button class="ans-btn btn-x" onclick="showAnswer('x')" ${lk}>×</button></div>`;
  }
  document.getElementById("content").innerHTML=html;
}

function move(d){cur=Math.max(0,Math.min(SLIDES.length-1,cur+d));render();}
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") move(1);
  if(e.key==="ArrowLeft")  move(-1);
});
render();
</script>
</body>
</html>
