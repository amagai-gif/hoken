<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復習クイズ：家族計画</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a1a;min-height:100vh;padding:1rem;font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:760px;}
.card{background:#0d0d0d;border-radius:16px;padding:2rem 2.5rem;min-height:480px;display:flex;flex-direction:column;position:relative;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.5);}
.q-num{font-size:13px;color:#888;margin-bottom:1rem;}
.q-text{font-size:24px;font-weight:700;line-height:1.6;white-space:pre-line;color:#fff;flex:1;margin-bottom:2rem;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto;}
.choice{padding:14px 16px;border:2px solid #333;background:#1a1a1a;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;color:#ccc;transition:all .15s;text-align:left;line-height:1.4;font-family:inherit;}
.choice:hover:not(:disabled){border-color:#888;color:#fff;background:#252525;}
.choice:disabled{cursor:default;}
.choice.correct{background:#0a2a18;border-color:#4ecb87;color:#4ecb87;}
.choice.wrong{background:#2a0a0a;border-color:#f07070;color:#f07070;}
.choice.show-correct{background:#0a2a18;border-color:#4ecb87;color:#4ecb87;opacity:.6;}
.result-box{margin-top:1.25rem;border-radius:12px;padding:1.25rem 1.5rem;animation:fadeUp .25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.result-ok{background:#0a2a18;border:1px solid #2a6e4a;}
.result-ng{background:#2a0a0a;border:1px solid #7a2020;}
.result-mark{font-size:20px;font-weight:700;margin-bottom:6px;}
.result-mark.ok{color:#4ecb87;}
.result-mark.ng{color:#f07070;}
.result-explain{font-size:14px;color:#ddd;line-height:1.7;white-space:pre-line;}
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;}
.nav-btn{border:1px solid #444;background:#1a1a1a;border-radius:8px;padding:11px 28px;font-size:14px;font-weight:500;cursor:pointer;color:#aaa;transition:all .15s;font-family:inherit;}
.nav-btn:hover{background:#2a2a2a;color:#fff;}
.nav-btn:disabled{opacity:.25;cursor:default;}
.dots{display:flex;gap:5px;flex-wrap:wrap;max-width:260px;justify-content:center;}
.dot{width:9px;height:9px;border-radius:50%;background:#333;transition:background .2s;flex-shrink:0;}
.dot.cur{background:#3dba7f;}
.dot.done-ok{background:#4ecb87;}
.dot.done-ng{background:#f07070;}
.prog{font-size:12px;color:#555;margin-top:4px;text-align:center;}
#result-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:480px;text-align:center;}
#result-screen.show{display:flex;}
.result-emoji{font-size:72px;margin-bottom:1rem;animation:bounce 1s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.result-title{font-size:36px;font-weight:700;color:#fff;margin-bottom:0.5rem;}
.result-score{font-size:20px;color:#aaa;margin-bottom:1.5rem;}
.retry-btn{border:2px solid #3dba7f;background:transparent;color:#3dba7f;border-radius:12px;padding:14px 40px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.retry-btn:hover{background:#3dba7f;color:#000;}
#celebrate{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);}
#celebrate.show{display:flex;}
#celebrate canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.celeb-msg{position:relative;z-index:10;text-align:center;animation:celebIn .6s cubic-bezier(.2,1.4,.4,1) both;}
@keyframes celebIn{from{transform:scale(.3);opacity:0;}to{transform:scale(1);opacity:1;}}
.celeb-emoji{font-size:72px;display:block;margin-bottom:.5rem;animation:bounce 1s ease-in-out infinite;}
.celeb-title{font-size:48px;font-weight:700;color:#3dba7f;text-shadow:0 0 30px rgba(61,186,127,.8);margin-bottom:.4rem;}
.celeb-sub{font-size:22px;color:#fff;margin-bottom:2rem;}
.celeb-close{border:2px solid #3dba7f;background:transparent;color:#3dba7f;border-radius:12px;padding:12px 36px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.celeb-close:hover{background:#3dba7f;color:#000;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card" id="quiz-card">
    <div class="q-num" id="q-num"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div id="result-box" style="display:none;"></div>
  </div>
  <div class="card" id="result-screen">
    <div class="result-emoji" id="res-emoji"></div>
    <div class="result-title" id="res-title"></div>
    <div class="result-score" id="res-score"></div>
    <button class="retry-btn" onclick="retry()">もう一度チャレンジ！</button>
  </div>
  <div class="nav" id="nav-wrap">
    <button class="nav-btn" id="prev" onclick="move(-1)" disabled>← 前へ</button>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="dots" id="dots"></div>
      <div class="prog" id="prog"></div>
    </div>
    <button class="nav-btn" id="next-btn" onclick="nextQ()" disabled>次の問題 →</button>
  </div>
</div>
<div id="celebrate">
  <canvas id="fw-canvas"></canvas>
  <div class="celeb-msg">
    <span class="celeb-emoji">🌿</span>
    <div class="celeb-title">全問正解！！</div>
    <div class="celeb-sub">家族計画マスター🎉</div>
    <button class="celeb-close" onclick="closeCeleb()">閉じる</button>
  </div>
</div>
<script>
const QS=[
  {q:"家族計画とは何か。最も適切なものはどれ？",
   choices:["子どもの数や出産時期を夫婦で計画すること","国が定める出生率の目標","妊娠中の食事・運動計画","出産後の育児スケジュール"],
   ans:0,explain:"家族計画とは、子どもをいつ、何人持つかを夫婦が話し合って自主的に決めることです。\n避妊や不妊治療の選択もこれに含まれます。"},
  {q:"コンドームの主な役割として\n正しいものはどれ？",
   choices:["妊娠の予防のみ","性感染症の予防のみ","妊娠と性感染症の予防の両方","ホルモンバランスの調整"],
   ans:2,explain:"コンドームは妊娠予防と性感染症予防の両方に効果があります。\nただし100%ではないため、正しい使い方が重要です。"},
  {q:"経口避妊薬（ピル）が日本で\n避妊目的に認可された年はいつ？",
   choices:["1960年","1975年","1999年","2010年"],
   ans:2,explain:"日本での経口避妊薬の認可は1999年です。\nアメリカ（1960年）より約40年遅れました。\n現在でも使用率は約3%と欧米より低いです。"},
  {q:"人工妊娠中絶が\n原則として認められる週数は？",
   choices:["12週未満","16週未満","22週未満","28週未満"],
   ans:2,explain:"日本では妊娠22週未満（21週6日まで）が\n人工妊娠中絶の原則的な期限です。\n母体保護法に基づいて実施されます。"},
  {q:"緊急避妊薬（アフターピル）の効果が\n最も高い服用タイミングはいつ？",
   choices:["性交後24時間以内","性交後72時間以内","性交後1週間以内","月経開始日"],
   ans:1,explain:"緊急避妊薬は性交後72時間以内に服用するほど効果が高く、\n早いほど効果的です（24時間以内が最も効果的）。\n2026年から一部薬局で処方箋なしで購入可能になりました。"},
  {q:"望まない妊娠の原因として\n最も多いのはどれ？",
   choices:["避妊に失敗した","避妊しなかった","避妊の方法を知らなかった","パートナーが反対した"],
   ans:1,explain:"「避妊しなかった」が最多です。\n「なんとかなると思った」「話し合えなかった」など\n避妊についてパートナーと話し合えなかったケースが多いです。"},
  {q:"不妊治療について\n正しいのはどれ？",
   choices:["女性側の問題が原因のほとんど","男性側の問題が原因のほとんど","男女ともに原因になりうる","治療法はまだ存在しない"],
   ans:2,explain:"不妊の原因は女性側・男性側・両方・原因不明など様々です。\n「不妊は女性の問題」という誤解がありますが、\n男性側に原因があるケースも約半数あります。"},
  {q:"プレコンセプションケアとは何か？",
   choices:["妊娠中の栄養管理","妊娠前から将来の妊娠・出産を見据えて健康に気をつけること","出産後の母体ケア","避妊の方法を選ぶこと"],
   ans:1,explain:"プレコンセプションケアとは「妊娠前ケア」のことで、\n将来の妊娠・出産・子どもの健康を見据えて\n妊娠前から健康管理（葉酸摂取・禁煙など）を行うことです。"},
];
let cur=0;
let answers=new Array(QS.length).fill(null);
let fwAnim=null;
function renderDots(){document.getElementById("dots").innerHTML=QS.map((_,i)=>{let c="dot";if(i===cur)c+=" cur";else if(answers[i]!==null)c+=answers[i]===QS[i].ans?" done-ok":" done-ng";return`<div class="${c}"></div>`;}).join("");}
function render(){
  const q=QS[cur];
  document.getElementById("q-num").textContent=`Q${cur+1} / ${QS.length}`;
  document.getElementById("q-text").textContent=q.q;
  document.getElementById("prev").disabled=cur===0;
  const chosen=answers[cur];
  const answered=chosen!==null;
  document.getElementById("next-btn").disabled=!answered;
  document.getElementById("next-btn").textContent=cur===QS.length-1?"結果を見る":"次の問題 →";
  document.getElementById("choices").innerHTML=q.choices.map((c,i)=>{
    let cls="choice";
    if(answered){if(i===q.ans)cls+=" correct";else if(i===chosen)cls+=" wrong";}
    return`<button class="${cls}" onclick="pick(${i})" ${answered?"disabled":""}>${c}</button>`;
  }).join("");
  const rb=document.getElementById("result-box");
  if(answered){
    const ok=chosen===q.ans;
    rb.style.display="block";
    rb.innerHTML=`<div class="result-box ${ok?"result-ok":"result-ng"}"><div class="result-mark ${ok?"ok":"ng"}">${ok?"○　正解！":"×　不正解"}</div><div class="result-explain">${q.explain}</div></div>`;
  }else{rb.style.display="none";rb.innerHTML="";}
  renderDots();
  document.getElementById("prog").textContent=`Q${cur+1} / ${QS.length}`;
}
function pick(i){if(answers[cur]!==null)return;answers[cur]=i;render();}
function move(d){cur=Math.max(0,Math.min(QS.length-1,cur+d));render();}
function nextQ(){if(cur===QS.length-1){showResult();}else{cur++;render();}}
function showResult(){
  const correct=answers.filter((a,i)=>a===QS[i].ans).length;
  document.getElementById("quiz-card").style.display="none";
  document.getElementById("nav-wrap").style.display="none";
  const rs=document.getElementById("result-screen");
  rs.classList.add("show");
  let emoji,title;
  if(correct===QS.length){emoji="🎉";title="完璧！全問正解！！";setTimeout(launchFw,300);}
  else if(correct>=6){emoji="😊";title="よくできました！";}
  else if(correct>=4){emoji="🙂";title="なかなかいい！";}
  else{emoji="📖";title="もう一度復習しよう！";}
  document.getElementById("res-emoji").textContent=emoji;
  document.getElementById("res-title").textContent=title;
  document.getElementById("res-score").textContent=`${correct} / ${QS.length} 問正解`;
}
function retry(){cur=0;answers=new Array(QS.length).fill(null);document.getElementById("quiz-card").style.display="flex";document.getElementById("nav-wrap").style.display="flex";document.getElementById("result-screen").classList.remove("show");render();}
function launchFw(){
  const canvas=document.getElementById("fw-canvas");
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const particles=[];
  const COLORS=["#3dba7f","#4ecb87","#60b8ff","#a89ef5","#ffd700","#ff9060","#fff"];
  function burst(x,y){const color=COLORS[Math.floor(Math.random()*COLORS.length)];for(let i=0;i<80;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*6;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.012+Math.random()*.01,size:2+Math.random()*4,color});}}
  for(let i=0;i<6;i++)setTimeout(()=>burst(100+Math.random()*(canvas.width-200),80+Math.random()*(canvas.height*.5)),i*180);
  let bc=0;const bi=setInterval(()=>{burst(100+Math.random()*(canvas.width-200),60+Math.random()*(canvas.height*.55));bc++;if(bc>20)clearInterval(bi);},400);
  function loop(){ctx.fillStyle="rgba(0,0,0,0.18)";ctx.fillRect(0,0,canvas.width,canvas.height);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.vx*=.98;p.life-=p.decay;if(p.life<=0){particles.splice(i,1);continue;}ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;fwAnim=requestAnimationFrame(loop);}
  document.getElementById("celebrate").classList.add("show");loop();
}
function closeCeleb(){document.getElementById("celebrate").classList.remove("show");if(fwAnim)cancelAnimationFrame(fwAnim);}
render();
</script>
</body>
</html>
